<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>云栖浅食</title>
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #fef3c7 0%, #d1fae5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      width: 100%;
    }
    h1 { color: #059669; margin: 0 0 10px; font-size: 24px; }
    p { color: #6b7280; margin: 0 0 20px; }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 500;
      transition: transform 0.2s;
    }
    .btn:hover { transform: scale(1.05); }
    .links {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      font-size: 14px;
      color: #059669;
      text-decoration: none;
    }
    .links a:hover { text-decoration: underline; }
  </style>
  <script>
    // 智能 SPA 路由回退
    (function() {
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var fullPath = path + search + hash;

      // 判断属于哪个子应用
      var targetBase = '';
      var relativePath = '';

      if (path.indexOf('/yunqi-canteen/client/') === 0 || path === '/yunqi-canteen/client') {
        targetBase = '/yunqi-canteen/client/';
        relativePath = path.replace('/yunqi-canteen/client', '') || '/';
      } else if (path.indexOf('/yunqi-canteen/admin/') === 0 || path === '/yunqi-canteen/admin') {
        targetBase = '/yunqi-canteen/admin/';
        relativePath = path.replace('/yunqi-canteen/admin', '') || '/';
      } else {
        // 其他情况回到引导首页
        window.location.href = './';
        return;
      }

      // 保存原始路径，应用加载后可以恢复
      try {
        sessionStorage.setItem('spa-redirect-path', relativePath + search + hash);
      } catch (e) {}

      // 重定向到应用首页
      window.location.replace(targetBase);
    })();
  </script>
</head>
<body>
  <div class="card">
    <h1>🥗 云栖浅食</h1>
    <p>正在跳转...</p>
    <a href="./" class="btn">返回首页</a>
    <div class="links">
      <a href="./client/">客户端点餐</a>
      <a href="./admin/">商家后台</a>
    </div>
  </div>
</body>
</html>
