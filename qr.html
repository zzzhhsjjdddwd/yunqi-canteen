<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>扫码访问 - 云栖浅食</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 50%, #f0fdfa 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      padding: 40px 0 30px;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border-radius: 20px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.3);
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #065f46;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: #047857;
      opacity: 0.8;
    }
    .section {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      border: 1px solid #d1fae5;
      text-align: center;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #065f46;
      margin-bottom: 16px;
    }
    .qr-code {
      width: 200px;
      height: 200px;
      margin: 0 auto 16px;
      background: #f9fafb;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed #d1d5db;
    }
    .qr-code canvas {
      width: 180px;
      height: 180px;
    }
    .qr-url {
      font-size: 13px;
      color: #6b7280;
      word-break: break-all;
      background: #f9fafb;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .open-btn {
      display: inline-block;
      padding: 12px 32px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      transition: transform 0.2s;
    }
    .open-btn:active {
      transform: scale(0.98);
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      background: #f3f4f6;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
    }
    .qr-panel {
      display: none;
    }
    .qr-panel.active {
      display: block;
    }
    .footer {
      text-align: center;
      padding: 30px 0;
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🥗</div>
      <h1>云栖浅食</h1>
      <p class="subtitle">扫码访问，快速点餐</p>
    </div>

    <div class="section">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('client')">🍱 客户端</div>
        <div class="tab" onclick="switchTab('admin')">📊 商家端</div>
      </div>

      <div id="client-panel" class="qr-panel active">
        <div class="section-title">客户端扫码点餐</div>
        <div class="qr-code" id="client-qr"></div>
        <div class="qr-url" id="client-url"></div>
        <a href="./client/" class="open-btn">立即访问</a>
      </div>

      <div id="admin-panel" class="qr-panel">
        <div class="section-title">商家端管理后台</div>
        <div class="qr-code" id="admin-qr"></div>
        <div class="qr-url" id="admin-url"></div>
        <a href="./admin/" class="open-btn">立即访问</a>
      </div>
    </div>

    <div class="footer">
      © 2024 云栖浅食 · 健康每一餐
    </div>
  </div>

  <script>
    function getCurrentUrl() {
      return window.location.origin + window.location.pathname.replace('qr.html', '');
    }

    function generateQRCode(canvasId, url) {
      const container = document.getElementById(canvasId);
      const size = 180;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const qr = generateQR(url);
      const cellSize = size / qr.length;

      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, size, size);

      ctx.fillStyle = '#065f46';
      for (let i = 0; i < qr.length; i++) {
        for (let j = 0; j < qr[i].length; j++) {
          if (qr[i][j]) {
            ctx.fillRect(j * cellSize, i * cellSize, cellSize, cellSize);
          }
        }
      }

      container.innerHTML = '';
      container.appendChild(canvas);
    }

    function generateQR(text) {
      const size = 25;
      const matrix = [];
      for (let i = 0; i < size; i++) {
        matrix[i] = [];
        for (let j = 0; j < size; j++) {
          matrix[i][j] = 0;
        }
      }

      for (let i = 0; i < 7; i++) {
        for (let j = 0; j < 7; j++) {
          const isOuter = i === 0 || i === 6 || j === 0 || j === 6;
          const isInner = i >= 2 && i <= 4 && j >= 2 && j <= 4;
          if (isOuter || isInner) {
            matrix[i][j] = 1;
            matrix[i][size - 1 - j] = 1;
            matrix[size - 1 - i][j] = 1;
          }
        }
      }

      let hash = 0;
      for (let i = 0; i < text.length; i++) {
        hash = ((hash << 5) - hash) + text.charCodeAt(i);
        hash = hash & hash;
      }

      for (let i = 8; i < size - 8; i++) {
        for (let j = 8; j < size - 8; j++) {
          const pos = (i * size + j + Math.abs(hash)) % 7;
          matrix[i][j] = pos < 3 ? 1 : 0;
        }
      }

      return matrix;
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.qr-panel').forEach(p => p.classList.remove('active'));
      
      if (tab === 'client') {
        document.querySelectorAll('.tab')[0].classList.add('active');
        document.getElementById('client-panel').classList.add('active');
      } else {
        document.querySelectorAll('.tab')[1].classList.add('active');
        document.getElementById('admin-panel').classList.add('active');
      }
    }

    window.onload = function() {
      const baseUrl = getCurrentUrl();
      const clientUrl = baseUrl + 'client/';
      const adminUrl = baseUrl + 'admin/';
      
      document.getElementById('client-url').textContent = clientUrl;
      document.getElementById('admin-url').textContent = adminUrl;
      
      generateQRCode('client-qr', clientUrl);
      generateQRCode('admin-qr', adminUrl);
    };
  </script>
</body>
</html>
