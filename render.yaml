services:
  - type: web
    name: yunqi-deploy
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx prisma db push && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        value: admin123
      - key: DATABASE_URL
        value: file:./data/prisma.db
    healthCheckPath: /api/health
    autoDeploy: yes
    branch: main
    rootDir: server
