<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#10B981" />
  <meta name="description" content="云栖浅食 二维码 - 客户端与商家端入口" />
  <title>二维码 · 云栖浅食</title>
  <link rel="icon" type="image/svg+xml" href="./client/icons/favicon.svg" />
  <link rel="apple-touch-icon" href="./client/icons/apple-touch-icon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(180deg, #FFFBEB 0%, #ECFDF5 100%); min-height: 100%; }
    @media print {
      .no-print { display: none !important; }
      body { background: #fff !important; }
      .print-card { box-shadow: none !important; border: 1px solid #e5e7eb !important; }
    }
  </style>
</head>
<body class="text-slate-800 antialiased">
  <div class="max-w-4xl mx-auto px-5 py-8">
    <div class="no-print mb-6 flex items-center justify-between">
      <a href="./" class="inline-flex items-center gap-1.5 text-sm text-slate-500 hover:text-leaf-600 transition">
        <span>←</span> 返回首页
      </a>
      <button onclick="window.print()" class="inline-flex items-center gap-1.5 text-sm bg-slate-800 hover:bg-slate-900 text-white rounded-lg px-3 py-1.5 transition">
        🖨 打印 / 导出 PDF
      </button>
    </div>

    <header class="text-center mb-8">
      <div class="text-4xl mb-3">🔳</div>
      <h1 class="text-2xl sm:text-3xl font-extrabold">扫码进入云栖浅食</h1>
      <p class="mt-2 text-sm text-slate-600">顾客扫左侧二维码点餐 · 商家扫右侧二维码管理</p>
    </header>

    <div class="grid sm:grid-cols-2 gap-5 sm:gap-6">
      <!-- Client QR -->
      <div class="print-card bg-white rounded-2xl border border-slate-200 shadow-sm p-5 sm:p-6 text-center">
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-leaf-100 text-leaf-700 text-xs font-semibold mb-3">
          CUSTOMER · 客户端
        </div>
        <div class="text-lg font-bold mb-1">我要点餐</div>
        <div class="text-xs text-slate-500 mb-4 break-all" id="client-url">…</div>
        <div class="bg-white border border-slate-200 rounded-xl p-3 inline-block">
          <img id="client-qr" alt="客户端二维码" class="w-56 h-56 sm:w-64 sm:h-64 mx-auto block" />
        </div>
      </div>

      <!-- Admin QR -->
      <div class="print-card bg-white rounded-2xl border border-slate-200 shadow-sm p-5 sm:p-6 text-center">
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-brand-100 text-brand-700 text-xs font-semibold mb-3">
          MERCHANT · 商家端
        </div>
        <div class="text-lg font-bold mb-1">我是商家</div>
        <div class="text-xs text-slate-500 mb-4 break-all" id="admin-url">…</div>
        <div class="bg-white border border-slate-200 rounded-xl p-3 inline-block">
          <img id="admin-qr" alt="商家端二维码" class="w-56 h-56 sm:w-64 sm:h-64 mx-auto block" />
        </div>
      </div>
    </div>

    <section class="no-print mt-8 text-xs text-slate-500 bg-white/60 border border-slate-200 rounded-xl p-4">
      <div class="font-semibold text-slate-700 mb-1">使用说明</div>
      二维码链接基于当前页面所在域名自动生成，请确认部署到正式域名后再打印张贴。
      可点击右上角"打印"按钮直接生成可张贴的 A4 二维码海报。
    </section>
  </div>

  <script>
    // 自动根据当前路径解析 base：../或./
    // 当前文件位于 <base>/qr.html → 客户端/商家端位于 ./client/ 和 ./admin/
    const base = location.pathname.replace(/qr\.html$/, '').replace(/\/$/, '/');
    const clientURL = location.origin + base + 'client/';
    const adminURL  = location.origin + base + 'admin/';

    document.getElementById('client-url').textContent = clientURL;
    document.getElementById('admin-url').textContent  = adminURL;

    const qrApi = 'https://api.qrserver.com/v1/create-qr-code/';
    const size  = '300x300';
    document.getElementById('client-qr').src = `${qrApi}?size=${size}&data=${encodeURIComponent(clientURL)}&margin=10`;
    document.getElementById('admin-qr').src  = `${qrApi}?size=${size}&data=${encodeURIComponent(adminURL)}&margin=10`;
  </script>
</body>
</html>
