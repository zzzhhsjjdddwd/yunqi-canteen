<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>云栖浅食 - 健康轻食点餐系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 50%, #f0fdfa 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 500px;
      width: 100%;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border-radius: 20px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.3);
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #065f46;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 16px;
      color: #047857;
      margin-bottom: 40px;
      opacity: 0.8;
    }
    .cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      border: 1px solid #d1fae5;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.15);
      border-color: #10b981;
    }
    .card-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: #065f46;
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 14px;
      color: #6b7280;
    }
    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🥗</div>
    <h1>云栖浅食</h1>
    <p class="subtitle">健康轻食 · 新鲜食材 · 现做现送</p>
    
    <div class="cards">
      <a href="./client/" class="card">
        <div class="card-icon">🍱</div>
        <div class="card-title">顾客端</div>
        <div class="card-desc">浏览菜单、在线点餐、查看订单</div>
      </a>
      <a href="./admin/" class="card">
        <div class="card-icon">📊</div>
        <div class="card-title">商家管理后台</div>
        <div class="card-desc">订单管理、商品管理、数据统计</div>
      </a>
    </div>
    
    <div class="footer">
      © 2024 云栖浅食 · 健康每一餐
    </div>
  </div>
</body>
</html>
